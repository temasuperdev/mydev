---
- name: Установка Docker и настройка пользователя
  hosts: all
  become: yes
  tasks:
    - name: Установка зависимостей
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: yes

    - name: Создание директории для ключей
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Добавление GPG-ключа Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Добавление репозитория Docker
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch | default('amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    - name: Установка Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Добавить пользователя в группу docker
      ansible.builtin.user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes
      notify: перезапустить сессию

  handlers:
    - name: перезапустить сессию
      ansible.builtin.debug:
        msg: "Пожалуйста, выйдите и войдите в систему заново, чтобы изменения группы docker вступили в силу."
      listen: "перезапустить сессию"
      # Это необязательный хендлер: команда newgrp docker применяет группу только в текущей shell-сессии,
      # поэтому в автоматизации Ansible или при новых SSH-подключениях пользователь получит группу docker только после повторного входа.
